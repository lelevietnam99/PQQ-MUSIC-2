<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Nhạc Của Thầy</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; background-color: #f9f9f9; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input[type="text"], input[type="file"], textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #d35400; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #e67e22; }
        
        .song-item { border-bottom: 1px solid #eee; padding: 15px 0; transition: background-color 0.3s; }
        .song-item.playing { background-color: #f0f8ff; border-radius: 8px; padding: 15px; } /* Hiệu ứng highlight bài đang phát */
        
        /* CSS MỚI CHO LỜI BÀI HÁT & NÚT THU NHỎ */
        .lyrics-container { margin-top: 10px; }
        .toggle-lyrics-btn { 
            background-color: #7f8c8d; /* Màu xám cho hành động phụ */
            padding: 5px 12px;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .toggle-lyrics-btn:hover { background-color: #95a5a6; }
        
        .lyrics-box { 
            background: #f4f4f4; 
            padding: 15px; 
            border-radius: 5px; 
            white-space: pre-wrap; 
            font-style: italic; 
            display: none; /* MẶC ĐỊNH ẨN LỜI BÀI HÁT */
        }
        
        audio { width: 100%; margin-top: 10px; }
        #status { color: #2980b9; font-weight: bold; margin-top: 10px; }
        
        /* CSS cho khu vực điều khiển mới */
        .controls-container { background: #e8f4f8; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #d4e6f1;}
        .play-modes { display: flex; gap: 20px; margin-top: 10px; font-weight: bold; color: #2c3e50; }
        .play-modes label { cursor: pointer; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🎵 Tải Lên Sáng Tác Mới</h2>
        <input type="text" id="songName" placeholder="Nhập tên bài hát..." required>
        <textarea id="songLyrics" rows="8" placeholder="Nhập lời bài hát vào đây..." required></textarea>
        <input type="file" id="audioFile" accept="audio/mp3, audio/wav" required>
        <button id="uploadBtn">Tải lên ngay</button>
        <p id="status"></p>
    </div>

    <div class="container">
        <h2>🎶 Danh Sách Bài Hát</h2>
        
        <div class="controls-container">
            <input type="text" id="searchInput" placeholder="🔍 Tìm kiếm tên bài hát hoặc lời nhạc...">
            <div class="play-modes">
                <label><input type="checkbox" id="autoPlayCb" checked> Tự động chuyển bài</label>
                <label><input type="checkbox" id="shuffleCb"> Phát ngẫu nhiên</label>
            </div>
        </div>

        <button id="loadBtn" style="background-color: #2c3e50; margin-bottom: 15px;">Làm mới Playlist</button>
        <div id="playlist"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 1. CẤU HÌNH FIREBASE (GIỮ NGUYÊN)
        const firebaseConfig = {
            apiKey: "AIzaSyBk8GWcMWZAN6MHdTce_lQs_EXev11tY7A",
            authDomain: "pqq-music-2.firebaseapp.com",
            projectId: "pqq-music-2",
            storageBucket: "pqq-music-2.firebasestorage.app",
            messagingSenderId: "778822786947",
            appId: "1:778822786947:web:bafcbdfe314208a912a0b6",
            measurementId: "G-47WV2FTGDE"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 2. CẤU HÌNH CLOUDINARY (GIỮ NGUYÊN)
        const CLOUD_NAME = "dzrlzothi"; 
        const UPLOAD_PRESET = "pqq-music-2"; 
        const CLOUDINARY_URL = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`;

        const uploadBtn = document.getElementById('uploadBtn');
        const loadBtn = document.getElementById('loadBtn');
        const statusText = document.getElementById('status');
        const playlistDiv = document.getElementById('playlist');
        const searchInput = document.getElementById('searchInput');

        // Biến toàn cục để quản lý Playlist
        let allSongsData = []; 
        let currentAudioElements = []; 
        let currentPlayingIndex = -1;

        // CHỨC NĂNG UPLOAD
        uploadBtn.addEventListener('click', async () => {
            const name = document.getElementById('songName').value;
            const lyrics = document.getElementById('songLyrics').value;
            const fileInput = document.getElementById('audioFile');

            if (!name || !lyrics || fileInput.files.length === 0) {
                alert("Xin vui lòng điền đầy đủ tên, lời bài hát và chọn file nhạc!");
                return;
            }

            const file = fileInput.files[0];
            statusText.innerText = "⏳ Đang tải file nhạc lên hệ thống... (Có thể mất vài phút tùy dung lượng)";
            uploadBtn.disabled = true;

            try {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', UPLOAD_PRESET);

                const cloudinaryResponse = await fetch(CLOUDINARY_URL, {
                    method: 'POST',
                    body: formData
                });
                
                const cloudinaryData = await cloudinaryResponse.json();
                
                if (!cloudinaryData.secure_url) {
                    throw new Error("Không lấy được link nhạc từ Cloudinary.");
                }
                
                const audioUrl = cloudinaryData.secure_url;
                statusText.innerText = "⏳ Nhạc đã tải xong. Đang lưu lời bài hát...";

                await addDoc(collection(db, "songs"), {
                    name: name,
                    lyrics: lyrics,
                    audioUrl: audioUrl,
                    timestamp: new Date()
                });

                statusText.style.color = "green";
                statusText.innerText = "✅ Đã tải lên thành công!";
                
                document.getElementById('songName').value = '';
                document.getElementById('songLyrics').value = '';
                fileInput.value = '';
                
                fetchAndLoadPlaylist(); 
            } catch (error) {
                console.error("Lỗi: ", error);
                statusText.style.color = "red";
                statusText.innerText = "❌ Có lỗi xảy ra: " + error.message;
            } finally {
                uploadBtn.disabled = false;
            }
        });

        // HÀM LẤY DỮ LIỆU TỪ FIREBASE
        async function fetchAndLoadPlaylist() {
            playlistDiv.innerHTML = "<p>Đang tải danh sách...</p>";
            try {
                const q = query(collection(db, "songs"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                
                allSongsData = []; // Reset mảng
                querySnapshot.forEach((doc) => {
                    allSongsData.push(doc.data());
                });
                
                renderPlaylist(allSongsData);
            } catch (error) {
                console.error("Lỗi tải playlist: ", error);
                playlistDiv.innerHTML = "<p style='color:red;'>Lỗi khi tải danh sách. Bạn đã bật Firestore Database chưa?</p>";
            }
        }

        // HÀM HIỂN THỊ DANH SÁCH (Hỗ trợ tìm kiếm, Số thứ tự, Ẩn/Hiện lời)
        function renderPlaylist(songsArray) {
            playlistDiv.innerHTML = ""; 
            currentAudioElements = []; 
            currentPlayingIndex = -1;

            if (songsArray.length === 0) {
                playlistDiv.innerHTML = "<p>Không tìm thấy bài hát nào.</p>";
                return;
            }

            songsArray.forEach((song, index) => {
                const songItem = document.createElement('div');
                songItem.className = 'song-item';
                
                const stt = index + 1; // Số thứ tự

                // CẤU TRÚC MỚI: Thêm container và nút toggle cho lời bài hát
                songItem.innerHTML = `
                    <h3>${stt}. ${song.name}</h3>
                    <audio controls preload="none">
                        <source src="${song.audioUrl}" type="audio/mpeg">
                        <source src="${song.audioUrl}" type="audio/wav">
                        Trình duyệt của bạn không hỗ trợ phát nhạc.
                    </audio>
                    <div class="lyrics-container">
                        <button class="toggle-lyrics-btn secondary">Xem lời bài hát</button>
                        <div class="lyrics-box">${song.lyrics}</div>
                    </div>
                `;
                
                playlistDiv.appendChild(songItem);

                // --- LOGIC XỬ LÝ ẨN/HIỆN LỜI BÀI HÁT ---
                const toggleBtn = songItem.querySelector('.toggle-lyrics-btn');
                const lyricsBox = songItem.querySelector('.lyrics-box');

                toggleBtn.addEventListener('click', () => {
                    // Kiểm tra trạng thái hiện tại (dựa vào display CSS)
                    const isCollapsed = window.getComputedStyle(lyricsBox).display === 'none';

                    if (isCollapsed) {
                        // Nếu đang ẩn: Hiện lên, đổi tên nút thành Thu nhỏ
                        lyricsBox.style.display = 'block';
                        toggleBtn.innerText = 'Thu nhỏ lời';
                    } else {
                        // Nếu đang hiện: Ẩn đi, đổi tên nút thành Xem lời
                        lyricsBox.style.display = 'none';
                        toggleBtn.innerText = 'Xem lời bài hát';
                    }
                });
                
                // Quản lý sự kiện phát nhạc (Tự động tắt bài cũ khi bài mới phát)
                const audioEl = songItem.querySelector('audio');
                currentAudioElements.push(audioEl);

                audioEl.addEventListener('play', () => {
                    currentPlayingIndex = index;
                    
                    document.querySelectorAll('.song-item').forEach(el => el.classList.remove('playing'));
                    songItem.classList.add('playing');

                    currentAudioElements.forEach((otherAudio, otherIndex) => {
                        if (otherIndex !== index && !otherAudio.paused) {
                            otherAudio.pause();
                        }
                    });
                });

                // Khi bài hát kết thúc (Xử lý Tự động chuyển bài / Phát ngẫu nhiên)
                audioEl.addEventListener('ended', () => {
                    handleSongEnd();
                });
            });
        }

        // THUẬT TOÁN CHUYỂN BÀI (GIỮ NGUYÊN)
        function handleSongEnd() {
            const isAutoPlay = document.getElementById('autoPlayCb').checked;
            const isShuffle = document.getElementById('shuffleCb').checked;

            if (!isAutoPlay || currentAudioElements.length === 0) return;

            let nextIndex = currentPlayingIndex + 1;

            if (isShuffle) {
                // Chọn ngẫu nhiên 1 bài khác với bài vừa phát
                nextIndex = Math.floor(Math.random() * currentAudioElements.length);
                if (currentAudioElements.length > 1 && nextIndex === currentPlayingIndex) {
                    nextIndex = (nextIndex + 1) % currentAudioElements.length;
                }
            } else {
                // Nếu đến bài cuối cùng thì quay lại bài đầu tiên
                if (nextIndex >= currentAudioElements.length) {
                    nextIndex = 0; 
                }
            }

            // Phát bài tiếp theo
            if (currentAudioElements[nextIndex]) {
                currentAudioElements[nextIndex].play();
                // Tự động cuộn màn hình tới bài đang phát cho dễ nhìn
                currentAudioElements[nextIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // CHỨC NĂNG TÌM KIẾM (GIỮ NGUYÊN)
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredSongs = allSongsData.filter(song => 
                song.name.toLowerCase().includes(searchTerm) || 
                song.lyrics.toLowerCase().includes(searchTerm)
            );
            renderPlaylist(filteredSongs);
        });

        // Khởi chạy khi tải trang
        loadBtn.addEventListener('click', fetchAndLoadPlaylist);
        fetchAndLoadPlaylist();
    </script>
</body>
</html>
